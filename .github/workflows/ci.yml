name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        id: build
        run: mvn clean package -DskipTests

      - name: Run tests
        id: tests
        run: mvn test

      # 어떤 단계에서든 실패 시 DevOps Agent에게 Webhook 전송
      - name: Notify DevOps Agent on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DEVOPS_AGENT_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.DEVOPS_AGENT_WEBHOOK_SECRET }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          INCIDENT_ID="ci-failure-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}"
          COMMIT_SHA="${GITHUB_SHA:0:7}"
          BRANCH="${GITHUB_REF_NAME}"
          ACTOR="${GITHUB_ACTOR}"

          FAILED_STEP="unknown"
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            FAILED_STEP="maven-build"
          elif [ "${{ steps.tests.outcome }}" = "failure" ]; then
            FAILED_STEP="maven-test"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "eventType": "incident",
            "incidentId": "$INCIDENT_ID",
            "action": "created",
            "priority": "HIGH",
            "title": "[CI/CD] Build failure in gsn-lampUp/devops-agent-test on branch $BRANCH (step: $FAILED_STEP)",
            "description": "CI/CD pipeline failure detected.\n\nRepository: gsn-lampUp/devops-agent-test\nBranch: $BRANCH\nCommit: $COMMIT_SHA\nTriggered by: $ACTOR\nFailed step: $FAILED_STEP\n\nThe Spring Boot application failed at the '$FAILED_STEP' stage.",
            "timestamp": "$TIMESTAMP",
            "service": "devops-agent-test-app",
            "data": {
              "metadata": {
                "repository": "gsn-lampUp/devops-agent-test",
                "branch": "$BRANCH",
                "commit": "$COMMIT_SHA",
                "actor": "$ACTOR",
                "runId": "$GITHUB_RUN_ID",
                "cluster": "kws-tokyo-cluster",
                "region": "ap-northeast-1",
                "failedStep": "$FAILED_STEP"
              }
            }
          }
          EOF
          )

          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -binary | base64)

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: $TIMESTAMP" \
            -H "x-amzn-event-signature: $SIGNATURE" \
            -d "$PAYLOAD")

          echo "Webhook sent to DevOps Agent. HTTP Status: $HTTP_STATUS"
