name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        id: install
        run: pip install -r requirements.txt

      - name: Run tests
        id: tests
        run: pytest tests/ -v --tb=short

      # 어떤 단계에서든 실패 시 DevOps Agent에게 Webhook 전송
      - name: Notify DevOps Agent on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DEVOPS_AGENT_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.DEVOPS_AGENT_WEBHOOK_SECRET }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          INCIDENT_ID="ci-failure-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}"
          COMMIT_SHA="${GITHUB_SHA:0:7}"
          BRANCH="${GITHUB_REF_NAME}"
          ACTOR="${GITHUB_ACTOR}"

          # 실패한 단계 식별
          FAILED_STEP="unknown"
          if [ "${{ steps.setup-python.outcome }}" = "failure" ]; then
            FAILED_STEP="setup-python"
          elif [ "${{ steps.install.outcome }}" = "failure" ]; then
            FAILED_STEP="install-dependencies"
          elif [ "${{ steps.tests.outcome }}" = "failure" ]; then
            FAILED_STEP="run-tests"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "eventType": "incident",
            "incidentId": "$INCIDENT_ID",
            "action": "created",
            "priority": "HIGH",
            "title": "[CI/CD] Pipeline failure in gsn-lampUp/devops-agent-test on branch $BRANCH (step: $FAILED_STEP)",
            "description": "CI/CD pipeline failure detected.\n\nRepository: gsn-lampUp/devops-agent-test\nBranch: $BRANCH\nCommit: $COMMIT_SHA\nTriggered by: $ACTOR\nFailed step: $FAILED_STEP\n\nThe pipeline failed at the '$FAILED_STEP' stage. Please investigate the build logs for details.",
            "timestamp": "$TIMESTAMP",
            "service": "devops-agent-test-app",
            "data": {
              "metadata": {
                "repository": "gsn-lampUp/devops-agent-test",
                "branch": "$BRANCH",
                "commit": "$COMMIT_SHA",
                "actor": "$ACTOR",
                "runId": "$GITHUB_RUN_ID",
                "cluster": "kws-tokyo-cluster",
                "region": "ap-northeast-1",
                "failedStep": "$FAILED_STEP"
              }
            }
          }
          EOF
          )

          # HMAC 서명 생성
          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -binary | base64)

          # Webhook 전송
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: $TIMESTAMP" \
            -H "x-amzn-event-signature: $SIGNATURE" \
            -d "$PAYLOAD")

          echo "Webhook sent to DevOps Agent. HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ DevOps Agent investigation triggered successfully"
          else
            echo "⚠️ Webhook returned status $HTTP_STATUS"
          fi
